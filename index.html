<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NYU Graduation Adventure</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    background: #2d0a50;
    display: -webkit-flex; display: flex;
    -webkit-flex-direction: column; flex-direction: column;
    -webkit-align-items: center; align-items: center;
    -webkit-justify-content: center; justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden; touch-action: none;
  }
  #title {
    color: #f5d76e; font-size: 18px; font-weight: bold;
    margin-bottom: 8px; text-shadow: 2px 2px 0 #9b1de8; letter-spacing: 2px;
  }
  #outer { -webkit-transform-origin: top center; transform-origin: top center; }
  #gameWrap {
    position: relative;
    border: 5px solid #9b1de8; border-radius: 6px;
    box-shadow: 0 0 40px rgba(155,29,232,0.7);
  }
  canvas { display: block; }
  #hud {
    position: absolute; top: 8px; left: 0; right: 0;
    display: -webkit-flex; display: flex;
    -webkit-justify-content: center; justify-content: center;
    pointer-events: none;
  }
  .step { margin: 0 3px; }
  .step {
    background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.3);
    border-radius: 20px; padding: 3px 10px; font-size: 10px;
    color: rgba(255,255,255,0.5); font-family: 'Courier New', monospace;
  }
  .step.done   { background:#3a8a3a; border-color:#5eca5e; color:#fff; }
  .step.active { background:#57106e; border-color:#c040e0; color:#f5d76e; font-weight:bold; }
  #dialogue {
    position: absolute; bottom: 8px; left: 8px; right: 8px;
    background: #fffde8; border: 3px solid #57106e; border-radius: 10px;
    padding: 10px 14px; font-size: 13px; color: #2a1a00; line-height: 1.6;
    display: none; font-family: 'Courier New', monospace;
    min-height: 72px; cursor: pointer; z-index: 10;
  }
  #dialogue .speaker { font-weight:bold; color:#57106e; font-size:11px; margin-bottom:3px; }
  #dialogue .prompt  { font-size:10px; color:#888; text-align:right; margin-top:4px; }
  #touch-ui {
    position: absolute; bottom: 90px; left: 0; right: 0;
    display: -webkit-flex; display: flex;
    -webkit-justify-content: space-between; justify-content: space-between;
    -webkit-align-items: flex-end; align-items: flex-end;
    padding: 0 14px; pointer-events: none; z-index: 5;
  }
  #dpad { position: relative; width: 114px; height: 114px; pointer-events: all; }
  .db {
    position: absolute; width: 36px; height: 36px;
    background: rgba(87,16,110,0.75); border: 2px solid rgba(245,215,110,0.55);
    border-radius: 8px; color: #f5d76e; font-size: 20px; font-weight: bold;
    display: -webkit-flex; display: flex;
    -webkit-align-items: center; align-items: center;
    -webkit-justify-content: center; justify-content: center;
    cursor: pointer; -webkit-user-select: none; user-select: none;
    touch-action: none; -webkit-touch-callout: none; text-align: center;
  }
  #bu { top:0;    left:39px; }
  #bd { bottom:0; left:39px; }
  #bl { top:39px; left:0; }
  #br { top:39px; right:0; }
  #btn-a {
    pointer-events: all; width: 68px; height: 68px;
    background: rgba(87,16,110,0.82); border: 2px solid #f5d76e;
    border-radius: 50%; color: #f5d76e; font-size: 12px; font-weight: bold;
    font-family: 'Courier New', monospace;
    display: -webkit-flex; display: flex;
    -webkit-align-items: center; align-items: center;
    -webkit-justify-content: center; justify-content: center;
    cursor: pointer; -webkit-user-select: none; user-select: none;
    touch-action: none; text-align: center; line-height: 1.3;
  }
  #win-screen {
    position: absolute; top:0; right:0; bottom:0; left:0;
    background: rgba(87,16,110,0.93); display: none;
    -webkit-flex-direction: column; flex-direction: column;
    -webkit-align-items: center; align-items: center;
    -webkit-justify-content: center; justify-content: center;
    color: #f5d76e; font-family: 'Courier New', monospace;
    text-align: center; padding: 24px; z-index: 20;
  }
  #win-screen h1 { font-size:26px; margin-bottom:12px; }
  #win-screen p  { font-size:13px; line-height:1.9; color:#fff; }
  #win-screen .hearts { font-size:32px; margin-top:16px; }
</style>
</head>
<body>
<div id="title">NYU GRADUATION ADVENTURE</div>
<div id="outer">
<div id="gameWrap">
  <canvas id="c" width="640" height="480"></canvas>
  <div id="hud">
    <div class="step active" id="s0">Bookstore</div>
    <div class="step" id="s1">Paulson</div>
    <div class="step" id="s2">Bobst</div>
    <div class="step" id="s3">WSP Arch</div>
  </div>
  <div id="dialogue">
    <div class="speaker" id="dlg-speaker"></div>
    <div id="dlg-text"></div>
    <div class="prompt">[ tap to continue ]</div>
  </div>
  <div id="touch-ui">
    <div id="dpad">
      <div class="db" id="bu">^</div>
      <div class="db" id="bd">v</div>
      <div class="db" id="bl">&lt;</div>
      <div class="db" id="br">&gt;</div>
    </div>
    <div id="btn-a">TAP<br>HERE</div>
  </div>
  <div id="win-screen">
    <h1>CONGRATULATIONS!</h1>
    <p>
      You walked across Washington Square Park,<br>
      stepped under the iconic NYU arch,<br>
      and leapt into the air --<br>
      <strong style="color:#f5d76e">a NYU GRADUATE!</strong><br><br>
      Textbooks. Class. Bobst. Arch.<br><br>
      <strong style="color:#f5d76e">So proud of you!</strong>
    </p>
    <div class="hearts">&#128156; &#127891; &#128156;</div>
  </div>
</div>
</div>
<script>
function showError(msg) {
  var cv = document.getElementById('c');
  if (!cv) return;
  var cx = cv.getContext('2d');
  cx.fillStyle = '#1a0030'; cx.fillRect(0,0,640,480);
  cx.fillStyle = '#ff4466'; cx.font = 'bold 15px Courier New';
  cx.fillText('ERROR:', 12, 34);
  cx.fillStyle = '#ffffff'; cx.font = '13px Courier New';
  var str = String(msg) || 'unknown';
  for (var si=0, li=0; si<str.length; si+=54, li++)
    cx.fillText(str.substring(si, si+54), 12, 58+li*20);
}
window.onerror = function(msg, src, line) { showError('L'+line+': '+msg); };

function oval(ctx, cx, cy, rx, ry) {
  var k = 0.5523;
  ctx.beginPath();
  ctx.moveTo(cx, cy-ry);
  ctx.bezierCurveTo(cx+rx*k, cy-ry,   cx+rx,   cy-ry*k, cx+rx, cy);
  ctx.bezierCurveTo(cx+rx,   cy+ry*k, cx+rx*k, cy+ry,   cx,    cy+ry);
  ctx.bezierCurveTo(cx-rx*k, cy+ry,   cx-rx,   cy+ry*k, cx-rx, cy);
  ctx.bezierCurveTo(cx-rx,   cy-ry*k, cx-rx*k, cy-ry,   cx,    cy-ry);
  ctx.closePath();
}
function rrect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);   ctx.arcTo(x+w, y,   x+w, y+r,   r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h);   ctx.arcTo(x,   y+h, x,   y+h-r, r);
  ctx.lineTo(x,   y+r);   ctx.arcTo(x,   y,   x+r, y,     r);
  ctx.closePath();
}

function scaleGame() {
  var outer = document.getElementById('outer');
  var th = document.getElementById('title').offsetHeight + 10;
  var s = Math.min((window.innerWidth-10)/650, (window.innerHeight-th-10)/490);
  if (s > 1) s = 1;
  outer.style.webkitTransform = 'scale('+s+')';
  outer.style.transform = 'scale('+s+')';
}
window.addEventListener('resize', scaleGame);
scaleGame();

var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var W = 640, H = 480;

var keys = {};
var spaceJustPressed = false;
window.addEventListener('keydown', function(e) {
  if (!keys[e.key] && e.key===' ') spaceJustPressed = true;
  keys[e.key] = true;
  if (e.key===' '||e.key==='ArrowUp'||e.key==='ArrowDown'||
      e.key==='ArrowLeft'||e.key==='ArrowRight') e.preventDefault();
});
window.addEventListener('keyup', function(e) { keys[e.key] = false; });

function bindBtn(id, key) {
  var el = document.getElementById(id);
  el.addEventListener('touchstart',  function(e){ e.preventDefault(); keys[key]=true;  }, {passive:false});
  el.addEventListener('touchend',    function(e){ e.preventDefault(); keys[key]=false; }, {passive:false});
  el.addEventListener('touchcancel', function(e){ e.preventDefault(); keys[key]=false; }, {passive:false});
  el.addEventListener('mousedown', function(){ keys[key]=true; });
  el.addEventListener('mouseup',   function(){ keys[key]=false; });
}
bindBtn('bu','ArrowUp'); bindBtn('bd','ArrowDown');
bindBtn('bl','ArrowLeft'); bindBtn('br','ArrowRight');

var btnA = document.getElementById('btn-a');
btnA.addEventListener('touchstart', function(e){ e.preventDefault(); spaceJustPressed=true; }, {passive:false});
btnA.addEventListener('click', function(){ spaceJustPressed=true; });

var dlgEl = document.getElementById('dialogue');
dlgEl.addEventListener('touchstart', function(e){
  e.preventDefault();
  if (state==='dialogue') advanceDialogue();
}, {passive:false});
dlgEl.addEventListener('click', function(){
  if (state==='dialogue') advanceDialogue();
});

var state = 'playing';
var progress = 0;
var dialogueQueue = [], dialoguePage = 0, currentDialogueSrc = null;
var celebrateTimer = 0, jumpY = 0, jumpVel = 0, jumpCount = 0, winTimer = 0;
var player = {x:320, y:390, w:20, h:32, speed:2.5, walkFrame:0, walkTimer:0};

var buildings = [
  {
    id:'bookstore', label:'NYU Bookstore', sublabel:'726 Broadway',
    x:60, y:80, w:160, h:110, color:'#4a1080', roof:'#2d0a50',
    door:{x:120,y:188}, interactZone:{x:80,y:188,w:120,h:30},
    dialogues:[
      ["NYU Bookstore","Welcome! Here to pick up your textbooks?"],
      ["NYU Bookstore","Here you go -- your reading list for the semester!\nGood luck!"]
    ]
  },
  {
    id:'paulson', label:'Paulson Center', sublabel:'181 Mercer St',
    x:420, y:60, w:180, h:120, color:'#6b2090', roof:'#3d0a60',
    door:{x:490,y:178}, interactZone:{x:450,y:178,w:100,h:30},
    dialogues:[
      ["Professor","Ah, come in! Class is about to start!"],
      ["Professor","Today we cover everything you need to know.\nMake sure you have your textbooks!"],
      ["Professor","Excellent work! Go study at Bobst. Class dismissed!"]
    ]
  },
  {
    id:'bobst', label:'Bobst Library', sublabel:'70 Washington Sq S',
    x:50, y:270, w:190, h:120, color:'#8B1A1A', roof:'#5a0f0f',
    door:{x:130,y:388}, interactZone:{x:80,y:388,w:120,h:30},
    dialogues:[
      ["Bobst Library","Shhh... Welcome to Bobst!"],
      ["Bobst Library","You crack open your textbooks and study hard.\nHours pass... pages turn..."],
      ["Bobst Library","You've mastered it all! Washington Square Park\nis waiting -- go celebrate!"]
    ]
  }
];

var wsp          = {x:370,y:240,w:240,h:200};
var arch         = {x:460,y:248,w:60,h:70};
var archInteract = {x:450,y:310,w:80,h:30};
var archDialogues = [
  ["Wash. Sq. Park","You step under the iconic NYU arch..."],
  ["Wash. Sq. Park","The sun is shining. Your gown billows.\nYou made it through everything!"],
  ["You","...I DID IT!!!"]
];

var trees = [
  {x:15,y:15},{x:55,y:15},{x:270,y:15},{x:310,y:15},{x:360,y:15},
  {x:600,y:15},{x:15,y:240},{x:15,y:440},{x:600,y:440},
  {x:280,y:150},{x:340,y:200},{x:280,y:430},{x:340,y:430}
];

var fp = [30,50,80,50,130,50,180,50,230,50,30,100,30,150,30,200,
          620,100,620,150,620,200,620,300,620,350,620,400,
          30,440,80,440,130,440,180,440,100,160,150,160,200,160,250,160,
          390,250,395,280,395,340,390,370,450,430,480,430,510,430,540,430];
var flowers = [];
for (var fi=0; fi<fp.length; fi+=2) flowers.push({x:fp[fi],y:fp[fi+1]});

function overlap(ax,ay,aw,ah,bx,by,bw,bh) {
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}
function inZone(zone) {
  return overlap(player.x-player.w/2, player.y-player.h, player.w, player.h,
                 zone.x, zone.y, zone.w, zone.h);
}
function hitsBuilding(nx, ny) {
  for (var i=0; i<buildings.length; i++) {
    var b = buildings[i];
    if (overlap(nx-player.w/2,ny-player.h,player.w,player.h,b.x,b.y,b.w,b.h-5)) return true;
  }
  return false;
}

function startDialogue(lines, src) {
  dialogueQueue=lines; dialoguePage=0; currentDialogueSrc=src;
  state='dialogue'; showPage();
}
function showPage() {
  document.getElementById('dlg-speaker').textContent = dialogueQueue[dialoguePage][0];
  document.getElementById('dlg-text').textContent    = dialogueQueue[dialoguePage][1];
  dlgEl.style.display = 'block';
}
function advanceDialogue() {
  dialoguePage++;
  if (dialoguePage >= dialogueQueue.length) {
    dlgEl.style.display = 'none';
    state = 'playing';
    if (currentDialogueSrc === 'arch') {
      startCelebration();
    } else if (currentDialogueSrc !== 'intro') {
      progress++;
      updateHUD();
    }
    currentDialogueSrc = null;
  } else {
    showPage();
  }
}

function updateHUD() {
  var ids = ['s0','s1','s2','s3'];
  for (var i=0; i<4; i++) {
    var el = document.getElementById(ids[i]);
    if      (i < progress)  el.className = 'step done';
    else if (i === progress) el.className = 'step active';
    else                     el.className = 'step';
  }
}

function startCelebration() {
  state='celebrating'; celebrateTimer=0; jumpY=0; jumpVel=-12; jumpCount=0;
  updateHUD();
}

function drawGrass() {
  ctx.fillStyle='#6abf4b'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#74cc52';
  for (var r=0; r<16; r++)
    for (var c=0; c<21; c++)
      if ((r+c)%3===0) ctx.fillRect(c*32,r*32,32,32);
}
function drawPaths() {
  ctx.fillStyle='#d4c8a0';
  ctx.fillRect(0,400,W,40); ctx.fillRect(300,200,50,200);
  ctx.fillRect(60,200,160,200); ctx.fillRect(430,180,90,220);
  ctx.fillStyle='#c8bfa0';
  ctx.fillRect(370,240,240,200); ctx.fillRect(240,350,230,50);
}
function drawFlowers() {
  var cols=['#ff6b6b','#ffd93d','#ff9ff3','#74b9ff','#ffffff'];
  for (var i=0; i<flowers.length; i++) {
    var f=flowers[i], skip=false;
    for (var j=0; j<buildings.length; j++) {
      var b=buildings[j];
      if (f.x>b.x&&f.x<b.x+b.w&&f.y>b.y&&f.y<b.y+b.h) { skip=true; break; }
    }
    if (skip) continue;
    ctx.fillStyle=(f.x>wsp.x&&f.x<wsp.x+wsp.w&&f.y>wsp.y&&f.y<wsp.y+wsp.h)?'#ffaad4':cols[i%cols.length];
    ctx.beginPath(); ctx.arc(f.x,f.y,3,0,Math.PI*2); ctx.fill();
  }
}
function drawTree(tx, ty) {
  ctx.fillStyle='#8B6914'; ctx.fillRect(tx+6,ty+18,8,10);
  ctx.fillStyle='rgba(0,0,0,0.15)';
  oval(ctx,tx+10,ty+28,10,5); ctx.fill();
  ctx.fillStyle='#2d7a2d'; ctx.beginPath(); ctx.arc(tx+10,ty+14,11,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#3a9a3a';
  ctx.beginPath(); ctx.arc(tx+5, ty+10,8,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(tx+15,ty+10,8,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#52b852'; ctx.beginPath(); ctx.arc(tx+10,ty+6,7,0,Math.PI*2); ctx.fill();
}
function drawWSP() {
  ctx.fillStyle='#7dcf5a'; ctx.fillRect(wsp.x,wsp.y,wsp.w,wsp.h);
  ctx.strokeStyle='#4a9a30'; ctx.lineWidth=3;
  ctx.strokeRect(wsp.x,wsp.y,wsp.w,wsp.h);
  var fx=wsp.x+wsp.w/2+20, fy=wsp.y+wsp.h/2+20;
  ctx.fillStyle='#5ab4d4'; ctx.beginPath(); ctx.arc(fx,fy,20,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#7dd4f0'; ctx.beginPath(); ctx.arc(fx,fy,12,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#a0e8ff'; ctx.beginPath(); ctx.arc(fx,fy,5,0,Math.PI*2);  ctx.fill();
  ctx.fillStyle='#2d5a15'; ctx.font='bold 10px Courier New'; ctx.textAlign='center';
  ctx.fillText('Washington Square Park',wsp.x+wsp.w/2,wsp.y+15);
  ctx.textAlign='left';
  drawTree(wsp.x+10,wsp.y+20); drawTree(wsp.x+wsp.w-30,wsp.y+20);
  drawTree(wsp.x+10,wsp.y+wsp.h-30); drawTree(wsp.x+wsp.w-30,wsp.y+wsp.h-35);
  ctx.fillStyle='#c8bfa0';
  ctx.fillRect(arch.x+arch.w/2-8, arch.y+arch.h, 16, (wsp.y+wsp.h)-(arch.y+arch.h)-5);
}
function drawArch() {
  var x=arch.x, y=arch.y, w=arch.w, h=arch.h;
  ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.fillRect(x+4,y+4,w,h);
  ctx.fillStyle='#f0e6c8';
  ctx.fillRect(x,        y+h*0.35, w*0.22, h*0.65);
  ctx.fillRect(x+w*0.78, y+h*0.35, w*0.22, h*0.65);
  ctx.beginPath();
  ctx.moveTo(x,y+h*0.35);
  ctx.quadraticCurveTo(x+w/2,y-10,x+w,y+h*0.35);
  ctx.lineTo(x+w,y+h*0.55);
  ctx.quadraticCurveTo(x+w/2,y+h*0.2,x,y+h*0.55);
  ctx.closePath();
  ctx.fillStyle='#e8d8b0'; ctx.fill();
  ctx.strokeStyle='#b8a070'; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle='#57106e'; ctx.font='bold 8px Courier New'; ctx.textAlign='center';
  ctx.fillText('NYU',x+w/2,y+h*0.25); ctx.textAlign='left';
  if (progress===3 && inZone(archInteract)) drawPrompt(x+w/2,y-5);
}
function drawBuilding(b) {
  ctx.fillStyle='rgba(0,0,0,0.18)'; ctx.fillRect(b.x+5,b.y+5,b.w,b.h);
  ctx.fillStyle=b.color; ctx.fillRect(b.x,b.y,b.w,b.h);
  ctx.fillStyle=b.roof;  ctx.fillRect(b.x,b.y,b.w,18);
  ctx.fillStyle='#c8e8ff';
  var wc=Math.floor((b.w-20)/30);
  for (var i=0; i<wc; i++) {
    var wx=b.x+15+i*30;
    ctx.fillRect(wx,b.y+25,18,14);
    ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1; ctx.strokeRect(wx,b.y+25,18,14);
    if (b.h>80) { ctx.fillRect(wx,b.y+48,18,14); ctx.strokeRect(wx,b.y+48,18,14); }
  }
  ctx.fillStyle='#8B5E3C'; ctx.fillRect(b.door.x-10,b.door.y-28,20,28);
  ctx.fillStyle='#6B3E1C'; ctx.fillRect(b.door.x-10,b.door.y-28,20,3);
  ctx.fillStyle='#f5d76e';
  ctx.beginPath(); ctx.arc(b.door.x+6,b.door.y-14,2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#f5d76e'; ctx.fillRect(b.x+5,b.y+18,b.w-10,16);
  ctx.fillStyle='#2a1a00'; ctx.font='bold 9px Courier New'; ctx.textAlign='center';
  ctx.fillText(b.label,b.x+b.w/2,b.y+29);
  ctx.font='8px Courier New'; ctx.fillStyle='#554433';
  ctx.fillText(b.sublabel,b.x+b.w/2,b.y+37); ctx.textAlign='left';
  var idx=0;
  for (var j=0; j<buildings.length; j++) { if (buildings[j]===b) { idx=j; break; } }
  if (idx < progress) {
    ctx.fillStyle='#3a8a3a'; ctx.font='bold 18px Courier New'; ctx.textAlign='center';
    ctx.fillText('OK',b.x+b.w-18,b.y+16); ctx.textAlign='left';
  }
  if (idx===progress && inZone(b.interactZone)) drawPrompt(b.door.x,b.door.y-36);
}
function drawPrompt(x, y) {
  ctx.fillStyle='#f5d76e'; ctx.strokeStyle='#57106e'; ctx.lineWidth=2;
  rrect(ctx,x-35,y-14,70,18,6); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#2a1a00'; ctx.font='bold 9px Courier New'; ctx.textAlign='center';
  ctx.fillText('[ TAP HERE ]',x,y); ctx.textAlign='left';
}
function drawObjective() {
  var labels=[
    '> Go to the NYU Bookstore',
    '> Head to Paulson Center for class',
    '> Study at Bobst Library',
    '> Walk through the WSP arch!'
  ];
  if (state==='playing' && progress<4) {
    var txt=labels[progress];
    ctx.font='10px Courier New';
    var tw=ctx.measureText(txt).width;
    ctx.fillStyle='rgba(0,0,0,0.55)';
    rrect(ctx,8,H-22,tw+16,18,5); ctx.fill();
    ctx.fillStyle='#f5d76e'; ctx.fillText(txt,16,H-9);
  }
}
function drawCharacter(px, py, jOff) {
  ctx.save();
  ctx.translate(px, py-jOff);
  if (jOff>0) {
    ctx.fillStyle='rgba(0,0,0,0.22)';
    oval(ctx,0,0,10+jOff*0.3,5); ctx.fill();
  }
  ctx.fillStyle='#7B2FBE';
  ctx.beginPath(); ctx.moveTo(-9,-28); ctx.lineTo(9,-28);
  ctx.lineTo(13,0); ctx.lineTo(-13,0); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#9b4fde'; ctx.fillRect(-3,-26,6,26);
  ctx.fillStyle='#7B2FBE'; ctx.fillRect(-14,-26,7,16); ctx.fillRect(7,-26,7,16);
  var ls=(state==='playing') ? Math.sin(player.walkFrame*0.4)*4 : 0;
  ctx.fillStyle='#5a1a8e';
  ctx.fillRect(-8,0,7,12+ls); ctx.fillRect(1,0,7,12-ls);
  ctx.fillStyle='#1a1a1a';
  ctx.fillRect(-9,10+ls,9,4); ctx.fillRect(0,10-ls,9,4);
  ctx.fillStyle='#c68642'; ctx.fillRect(-3,-32,6,6);
  ctx.fillStyle='#d4956a';
  oval(ctx,0,-40,11,12); ctx.fill();
  ctx.fillStyle='#3d1c02';
  var hp=[[-9,-48,5],[-4,-52,5],[2,-53,5],[7,-50,5],[10,-46,4],[-11,-44,4],[-7,-44,4]];
  for (var h=0; h<hp.length; h++) {
    ctx.beginPath(); ctx.arc(hp[h][0],hp[h][1],hp[h][2],0,Math.PI*2); ctx.fill();
  }
  oval(ctx,0,-48,10,6); ctx.fill();
  ctx.fillStyle='#111111'; ctx.fillRect(-10,-53,20,6);
  ctx.fillStyle='#1a1a1a'; ctx.fillRect(-14,-56,28,5);
  ctx.strokeStyle='#f5d76e'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(12,-54); ctx.lineTo(15,-48); ctx.lineTo(15,-42); ctx.stroke();
  ctx.fillStyle='#f5d76e'; ctx.beginPath(); ctx.arc(15,-41,3,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#111111'; ctx.lineWidth=1.5;
  ctx.strokeRect(-9,-43,7,5); ctx.strokeRect(2,-43,7,5);
  ctx.beginPath(); ctx.moveTo(-2,-40); ctx.lineTo(2,-40); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-9,-40); ctx.lineTo(-12,-40); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(9,-40);  ctx.lineTo(12,-40);  ctx.stroke();
  if (progress>=1) {
    ctx.fillStyle='#e04040'; ctx.fillRect(9,-18,10,13);
    ctx.fillStyle='#ffffff'; ctx.font='5px Courier New'; ctx.fillText('NYU',10,-8);
    ctx.fillStyle='#2060c0'; ctx.fillRect(9,-5,10,10);
    ctx.fillStyle='#ffffff'; ctx.fillText('101',10,3);
  }
  ctx.restore();
}

function update() {
  if (state==='playing') {
    var dx=0, dy=0;
    if (keys['ArrowLeft'] ||keys['a']) dx=-player.speed;
    if (keys['ArrowRight']||keys['d']) dx= player.speed;
    if (keys['ArrowUp']   ||keys['w']) dy=-player.speed;
    if (keys['ArrowDown'] ||keys['s']) dy= player.speed;
    if (dx!==0 || dy!==0) {
      if (dx!==0 && dy!==0) { dx*=0.707; dy*=0.707; }
      var nx=Math.max(12,Math.min(W-12,player.x+dx));
      var ny=Math.max(32,Math.min(H-10,player.y+dy));
      if (!hitsBuilding(nx,player.y)) player.x=nx;
      if (!hitsBuilding(player.x,ny)) player.y=ny;
      if (progress<3 && overlap(player.x-player.w/2,player.y-player.h,player.w,player.h,
                                 wsp.x,wsp.y,wsp.w,wsp.h)) {
        if (player.x < wsp.x+wsp.w/2) player.x=wsp.x-player.w/2-1;
        else player.x=wsp.x+wsp.w+player.w/2+1;
      }
      player.walkTimer+=Math.abs(dx)+Math.abs(dy);
      if (player.walkTimer>4) { player.walkFrame++; player.walkTimer=0; }
    }
    if (spaceJustPressed) {
      for (var i=0; i<buildings.length; i++) {
        if (i===progress && inZone(buildings[i].interactZone)) {
          startDialogue(buildings[i].dialogues, buildings[i].id); break;
        }
      }
      if (progress===3 && inZone(archInteract)) startDialogue(archDialogues,'arch');
    }
  } else if (state==='dialogue') {
    if (spaceJustPressed) advanceDialogue();
  } else if (state==='celebrating') {
    celebrateTimer++; jumpY-=jumpVel; jumpVel+=0.6;
    if (jumpVel>0 && jumpY>=0) {
      jumpY=0; jumpVel=0; jumpCount++;
      if (jumpCount<3) {
        (function(){ setTimeout(function(){ jumpVel=-10; }, 200); })();
      } else {
        state='won'; winTimer=0;
      }
    }
  } else if (state==='won') {
    winTimer++;
    if (winTimer===60) {
      var ws=document.getElementById('win-screen');
      ws.style.display='block';
      ws.style.display='-webkit-flex';
      ws.style.display='flex';
    }
  }
  spaceJustPressed=false;
}

function render() {
  ctx.clearRect(0,0,W,H);
  drawGrass(); drawPaths(); drawFlowers();
  for (var i=0; i<trees.length; i++) drawTree(trees[i].x,trees[i].y);
  drawWSP();
  var bs=buildings.slice().sort(function(a,b){ return a.y-b.y; });
  for (var i=0; i<bs.length; i++) drawBuilding(bs[i]);
  drawArch();
  var jOff=(state==='celebrating'||state==='won') ? Math.max(0,-jumpY) : 0;
  drawCharacter(player.x,player.y,jOff);
  drawObjective();
}

function loop() {
  try { update(); render(); }
  catch(e) { showError(e.message||String(e)); return; }
  requestAnimationFrame(loop);
}

updateHUD();
requestAnimationFrame(loop);

setTimeout(function() {
  startDialogue([
    ["NYU Campus","Welcome to NYU! It's graduation day!"],
    ["NYU Campus","Pick up your textbooks, attend class, and study hard!"],
    ["NYU Campus","Use the D-pad to walk.\nTap TAP HERE near a building to enter.\nGood luck!"]
  ], 'intro');
}, 400);
</script>
